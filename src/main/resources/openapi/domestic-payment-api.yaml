          type: string
          description: Simulator frequency label such as VARIABLE or MONTHLY.
        purpose:
          type: string
      additionalProperties: false
      description: >
        JSON mandate simulation request. US_ACH_DEBIT_MANDATE expects USD;
        HK_FPS_EDDA expects HKD. The API does not perform real payer approval,
