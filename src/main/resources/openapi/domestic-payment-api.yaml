        - debtorName
        - creditorAccount
        - debtorAccount
        - maximumAmount
        - frequency
        - purpose
      properties:
        mandateProfile:
          type: string
          enum: [US_ACH_DEBIT_MANDATE, HK_FPS_EDDA]
        mandateReference:
          type: string
          description: Optional business mandate or eDDA authorization reference. If omitted, the simulator generates one.
        creditorName:
          type: string
        debtorName:
          type: string
        creditorAccount:
          $ref: '#/components/schemas/AccountReference'
        debtorAccount:
          $ref: '#/components/schemas/AccountReference'
