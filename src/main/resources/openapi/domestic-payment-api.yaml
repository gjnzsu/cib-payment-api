openapi: 3.0.3
info:
  title: Domestic RTP Payment Service API
  version: 0.2.0
  x-fi-simulator-limitation: no real SWIFT, CBPR+, correspondent banking, ledger, AML, sanctions, fraud, or settlement connectivity
  x-fi-status-idempotency: FI status query does not require Idempotency-Key
  x-classic-rail-simulator-limitation: no central bank ledger, liquidity, queue management, or settlement connectivity
  x-recommendation-threshold-note: deterministic simulator threshold
  x-recommendation-non-goal: no real AI, LLM, pricing, liquidity, sanctions, fraud, FX, compliance, or real rail availability decision
  description: >
    ISO-native HK domestic realtime payment simulation API. Payment initiation
    accepts supported pain.001.001.09 XML and returns pain.002.001.10 XML.
    The simulator has no real HKICL/FPS connectivity, and pacs.008 is internal
    only inside the payment engine mapping. Classic rail extensions are
    simulator-only: no real ACH or RTGS connectivity, no NACHA or ISO 20022
    runtime for ACH or RTGS, and no central bank ledger, liquidity, queue
    management, or settlement connectivity.
    Mandate and Collections simulation model a pre-authorized pull-payment
    journey with US ACH Direct Debit and HK FPS/eDDA simulator profiles only.
    They have no real ACH, NACHA, HK FPS, HKICL, eDDA setup, account validation,
    balance check, fraud, sanctions, clearing, settlement, payer notification,
    or production decisioning connectivity.
    Payment rail recommendation is deterministic simulator guidance only: no
    real AI, LLM, pricing, liquidity, sanctions, fraud, FX, compliance, or real
    rail availability decision.
    Payment Scenario Advisor adds simulator-only guidance that connects curated
    business scenarios to recommendation and simulator validation metadata. It
    does not create payment, recommendation, simulation, or report records.
servers:
  - url: http://localhost:8080
    description: Local development
security:
  - bearerAuth: []
paths:
  /v1/domestic-payments:
    post:
      operationId: CreateDomesticPayment
      summary: Create an ISO 20022 HK domestic realtime payment
      description: >
        Accepts one supported pain.001.001.09 customer credit transfer
        initiation message for the HKD-only simulator profile. Request
        admission failures return JSON errors and do not create a payment
        record or pain.002. Once admitted, the Payment Engine owns the payment
        record and returns a pain.002.001.10 status report with ACSC, RJCT, or
        PDNG. pacs.008 is internal only.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/pain.001+xml:
            schema:
              type: string
              format: xml
              description: Supported ISO 20022 pain.001.001.09 XML.
            examples:
              success:
                summary: HKD success scenario
                value: |-
                  <?xml version="1.0" encoding="UTF-8"?>
                  <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pain.001.001.09">
                    <CstmrCdtTrfInitn>
                      <GrpHdr><MsgId>MSG-20260524-0001</MsgId><NbOfTxs>1</NbOfTxs></GrpHdr>
                      <PmtInf>
                        <PmtInfId>PMT-20260524-SUCCESS</PmtInfId>
                        <CdtTrfTxInf>
                          <PmtId><InstrId>INSTR-20260524-0001</InstrId><EndToEndId>INV-2026-0001</EndToEndId></PmtId>
                          <Amt><InstdAmt Ccy="HKD">1250.50</InstdAmt></Amt>
                          <Cdtr><Nm>Supplier HK Limited</Nm></Cdtr>
                          <CdtrAcct><Id><Othr><Id>000123456789</Id></Othr></Id></CdtrAcct>
                          <RmtInf><Ustrd>Invoice INV-2026-0001 supplier settlement</Ustrd></RmtInf>
                        </CdtTrfTxInf>
                      </PmtInf>
                    </CstmrCdtTrfInitn>
                  </Document>
      responses:
        '200':
          description: >
            Request was processed by the API and Payment Engine. The payment
            outcome is reported in pain.002 using ACSC, RJCT, or PDNG.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/pain.002+xml:
              schema:
                type: string
                format: xml
              examples:
                settled:
                  summary: ACSC settled report
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pain.002.001.10">
                      <CstmrPmtStsRpt><OrgnlPmtInfAndSts><TxInfAndSts><OrgnlEndToEndId>INV-2026-0001</OrgnlEndToEndId><TxSts>ACSC</TxSts></TxInfAndSts></OrgnlPmtInfAndSts></CstmrPmtStsRpt>
                    </Document>
                rejected:
                  summary: RJCT business or scheme rejection
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pain.002.001.10">
                      <CstmrPmtStsRpt><OrgnlPmtInfAndSts><TxInfAndSts><OrgnlEndToEndId>INV-2026-0002</OrgnlEndToEndId><TxSts>RJCT</TxSts><StsRsnInf><Rsn><Cd>RJCT</Cd></Rsn></StsRsnInf></TxInfAndSts></OrgnlPmtInfAndSts></CstmrPmtStsRpt>
                    </Document>
                pending:
                  summary: PDNG processing or timeout report
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pain.002.001.10">
                      <CstmrPmtStsRpt><OrgnlPmtInfAndSts><TxInfAndSts><OrgnlEndToEndId>INV-2026-0005</OrgnlEndToEndId><TxSts>PDNG</TxSts><StsRsnInf><Rsn><Cd>PDNG</Cd></Rsn></StsRsnInf></TxInfAndSts></OrgnlPmtInfAndSts></CstmrPmtStsRpt>
                    </Document>
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/domestic-payments/{paymentId}:
    get:
      operationId: GetDomesticPaymentStatus
      summary: Get latest ISO payment status report
      description: >
        Returns the latest engine-owned pain.002.001.10 report for an
        ISO-created payment visible to the authenticated client.
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          description: Engine payment ID returned in the pain.002 report.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Latest pain.002.001.10 status report.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/pain.002+xml:
              schema:
                type: string
                format: xml
              examples:
                current:
                  summary: Current payment status report
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pain.002.001.10">
                      <CstmrPmtStsRpt><OrgnlPmtInfAndSts><TxInfAndSts><OrgnlEndToEndId>INV-2026-0001</OrgnlEndToEndId><TxSts>ACSC</TxSts></TxInfAndSts></OrgnlPmtInfAndSts></CstmrPmtStsRpt>
                    </Document>
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/ach-batches:
    post:
      operationId: CreateAchBatch
      summary: Create an ACH Direct Credit batch simulation
      description: >
        Accepts one JSON ACH Direct Credit batch envelope with multiple payment
        entries for the USD-only simulator profile. The API distinguishes batch
        acceptance, clearing, and settlement-style status reporting without
        generating NACHA files or running ISO 20022 ACH messages. Supported
        local/test-only X-Mock-Scenario values are ach_direct_credit_accepted,
        ach_direct_credit_settled, ach_direct_credit_settlement_pending,
        ach_direct_credit_partially_returned, and ach_direct_credit_rejected.
        This behavior is simulator-only with no real ACH or RTGS connectivity,
        no NACHA or ISO 20022 runtime for ACH or RTGS, and no central bank
        ledger, liquidity, queue management, or settlement connectivity.
      security:
        - bearerAuth: []
      x-required-scopes:
        - ach-batches:create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/AchMockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAchBatchRequest'
            examples:
              settled:
                summary: Direct Credit batch settled
                value:
                  batchReference: ACH-BATCH-20260602-001
                  originatorName: Example Treasury Ltd
                  effectiveEntryDate: '2026-06-02'
                  settlementAccount:
                    bankCode: USBANK
                    accountNumber: '000123456789'
                    accountName: Example Treasury Settlement
                  entries:
                    - entryReference: ACH-ENTRY-001
                      receiverName: Supplier One LLC
                      receiverAccount:
                        bankCode: USBANK
                        accountNumber: '000987654321'
                        accountName: Supplier One LLC
                      amount:
                        currency: USD
                        value: '1250.50'
                      purpose: Invoice INV-1001
                    - entryReference: ACH-ENTRY-002
                      receiverName: Supplier Two LLC
                      receiverAccount:
                        bankCode: USBANK
                        accountNumber: '000555000111'
                        accountName: Supplier Two LLC
                      amount:
                        currency: USD
                        value: '500.00'
                      purpose: Invoice INV-1002
      responses:
        '202':
          description: ACH batch accepted by the simulator for asynchronous status inspection.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchBatchResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/ach-batches/{batchId}:
    get:
      operationId: GetAchBatchStatus
      summary: Get ACH batch and entry-level status summary
      description: >
        Returns the current ACH batch status for the authenticated client that
        owns the batch. Status query does not require Idempotency-Key. The
        response includes batch-level status, derived entry count and total,
        entry-level status summaries, reason details when present, and
        correlation ID.
      security:
        - bearerAuth: []
      x-required-scopes:
        - ach-batches:read
      parameters:
        - name: batchId
          in: path
          required: true
          description: ACH batch ID returned by CreateAchBatch.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Current ACH batch and entry-level status response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchBatchStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/mandates:
    post:
      operationId: CreateMandate
      summary: Create a direct debit mandate simulation
      description: >
        Accepts one JSON mandate simulation request for US_ACH_DEBIT_MANDATE
        or HK_FPS_EDDA. This is simulator-only authorization setup: no real ACH,
        NACHA, HK FPS, HKICL, eDDA setup, payer notification, account validation,
        fraud, sanctions, or production decisioning connectivity.
      security:
        - bearerAuth: []
      x-required-scopes:
        - mandates:create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/MandateMockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMandateRequest'
            examples:
              usAchMandate:
                summary: US ACH Direct Debit mandate
                value:
                  mandateProfile: US_ACH_DEBIT_MANDATE
                  mandateReference: MANDATE-US-001
                  creditorName: CIB Collection Services
                  debtorName: Corporate Customer
                  creditorAccount:
                    bankCode: '021000021'
                    accountNumber: '123456789'
                    accountName: CIB Collections
                  debtorAccount:
                    bankCode: '111000025'
                    accountNumber: '987654321'
                    accountName: Corporate Customer
                  maximumAmount:
                    currency: USD
                    value: '1000.00'
                  frequency: VARIABLE
                  purpose: MONTHLY_COLLECTION
              hkFpsEdda:
                summary: HK FPS eDDA mandate
                value:
                  mandateProfile: HK_FPS_EDDA
                  mandateReference: EDDA-HK-001
                  creditorName: Sample Merchant HK
                  debtorName: Sample Payer HK
                  creditorAccount:
                    bankCode: '004'
                    accountNumber: '123456789'
                    accountName: Sample Merchant HK
                  debtorAccount:
                    bankCode: '024'
                    accountNumber: '987654321'
                    accountName: Sample Payer HK
                  maximumAmount:
                    currency: HKD
                    value: '1000.00'
                  frequency: VARIABLE
                  purpose: MONTHLY_TUTORIAL_FEE
      responses:
        '202':
          description: Mandate accepted by the simulator for status inspection.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MandateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/mandates/{mandateId}:
    get:
      operationId: GetMandateStatus
      summary: Get mandate status
      description: >
        Returns the current mandate status for the authenticated client that
        owns the mandate. Status query does not require Idempotency-Key.
      security:
        - bearerAuth: []
      x-required-scopes:
        - mandates:read
      parameters:
        - name: mandateId
          in: path
          required: true
          description: Mandate ID returned by CreateMandate.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Current mandate status response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MandateStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/mandates/{mandateId}/cancel:
    post:
      operationId: CancelMandate
      summary: Cancel a mandate simulation
      description: >
        Simulates cancellation of an owned active or pending mandate. This is a
        simulator-only status transition and does not notify payer banks or
        external schemes.
      security:
        - bearerAuth: []
      x-required-scopes:
        - mandates:cancel
      parameters:
        - name: mandateId
          in: path
          required: true
          description: Mandate ID returned by CreateMandate.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelMandateRequest'
      responses:
        '200':
          description: Mandate cancellation response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MandateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections:
    post:
      operationId: CreateCollection
      summary: Create a pre-authorized collection simulation
      description: >
        Accepts one JSON collection request for a supported simulator profile:
        US_ACH_DIRECT_DEBIT_BATCH or HK_FPS_DIRECT_DEBIT. A mandateReference is
        required. External mandate references are treated as evidence of an
        existing authorization. References created by /v1/mandates must be
        ACTIVE when used for collection simulation. This behavior is simulator-only:
        no real ACH, NACHA, HK FPS, HKICL, eDDA setup, account validation,
        balance check, fraud, sanctions, clearing, settlement, or production
        decisioning connectivity.
      security:
        - bearerAuth: []
      x-required-scopes:
        - collections:create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/CollectionMockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
            examples:
              usAchDebit:
                summary: US ACH Direct Debit batch collection
                value:
                  collectionProfile: US_ACH_DIRECT_DEBIT_BATCH
                  collectionReference: COLL-US-ACH-20260707-0001
                  mandateReference: MANDATE-US-001
                  creditorName: CIB Collection Services
                  debtorName: Corporate Customer
                  settlementAccount:
                    bankCode: '021000021'
                    accountNumber: '123456789'
                    accountName: CIB Collections
                  entries:
                    - entryReference: COLL-ENTRY-0001
                      payerName: Payer One
                      payerAccount:
                        bankCode: '111000025'
                        accountNumber: '987654321'
                        accountName: Payer One
                      amount:
                        currency: USD
                        value: '125.40'
                      purpose: INVOICE_COLLECTION
              hkFps:
                summary: HK FPS Direct Debit collection
                value:
                  collectionProfile: HK_FPS_DIRECT_DEBIT
                  collectionReference: COLL-HK-FPS-20260707-0001
                  mandateReference: EDDA-HK-001
                  creditorName: Sample Merchant HK
                  debtorName: Sample Payer HK
                  payerBankCode: '004'
                  payerAlias: FPS-PROXY-ALIAS
                  amount:
                    currency: HKD
                    value: '350.00'
                  purpose: MONTHLY_TUTORIAL_FEE
                  entries: []
      responses:
        '202':
          description: Collection accepted by the simulator for status inspection.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/collections/{collectionId}:
    get:
      operationId: GetCollectionStatus
      summary: Get collection status
      description: >
        Returns the current collection status for the authenticated client that
        owns the collection. Status query does not require Idempotency-Key.
      security:
        - bearerAuth: []
      x-required-scopes:
        - collections:read
      parameters:
        - name: collectionId
          in: path
          required: true
          description: Collection ID returned by CreateCollection.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Current collection status response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/rtgs-payments:
    post:
      operationId: CreateRtgsPayment
      summary: Create an RTGS payment simulation
      description: >
        Accepts one JSON RTGS payment instruction for CORPORATE or FI client
        segments in the USD-only simulator profile. Corporate requests provide
        debtor and creditor account references; FI requests provide instructing
        and instructed agent BICs. Supported local/test-only X-Mock-Scenario
        values are rtgs_settled, rtgs_queued_for_liquidity, and rtgs_rejected.
        This behavior is simulator-only with no real ACH or RTGS connectivity,
        no NACHA or ISO 20022 runtime for ACH or RTGS, and no central bank
        ledger, liquidity, queue management, or settlement connectivity.
      security:
        - bearerAuth: []
      x-required-scopes:
        - rtgs-payments:create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/RtgsMockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRtgsPaymentRequest'
            examples:
              corporateSettled:
                summary: Corporate RTGS settled
                value:
                  paymentReference: RTGS-CORP-20260602-001
                  clientSegment: CORPORATE
                  debtorAccount:
                    bankCode: USBANK
                    accountNumber: '000111222333'
                    accountName: Corporate Treasury LLC
                  creditorAccount:
                    bankCode: USBANK
                    accountNumber: '000444555666'
                    accountName: Supplier Settlement LLC
                  amount:
                    currency: USD
                    value: '250000.00'
                  requestedSettlementDate: '2026-06-02'
                  settlementPriority: HIGH
                  purpose: Same-day supplier settlement
              fiQueuedForLiquidity:
                summary: FI RTGS queued for liquidity
                value:
                  paymentReference: RTGS-FI-20260602-001
                  clientSegment: FI
                  instructingAgentBic: CIBBUS33
                  instructedAgentBic: FEDBUS33
                  amount:
                    currency: USD
                    value: '5000000.00'
                  requestedSettlementDate: '2026-06-02'
                  settlementPriority: URGENT
                  purpose: FI interbank settlement transfer
      responses:
        '202':
          description: RTGS payment accepted by the simulator for asynchronous status inspection.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RtgsPaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/rtgs-payments/{paymentId}:
    get:
      operationId: GetRtgsPaymentStatus
      summary: Get RTGS payment status
      description: >
        Returns the current RTGS payment status for the authenticated client
        that owns the payment. Status query does not require Idempotency-Key.
        The response includes clientSegment, settlementFinality, segment
        parties, reason details when present, links, and correlation ID.
      security:
        - bearerAuth: []
      x-required-scopes:
        - rtgs-payments:read
      parameters:
        - name: paymentId
          in: path
          required: true
          description: RTGS payment ID returned by CreateRtgsPayment.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Current RTGS payment status response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RtgsPaymentStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/fi-payments:
    post:
      operationId: CreateFiPayment
      summary: Create a simulator-only FI correspondent payment
      description: >
        Accepts one supported pacs.009.001.08 XML FI-to-FI payment initiation
        for the USD-only correspondent payment simulator profile. Requires the
        fi-payments:create scope and Idempotency-Key. Returns 202 Accepted with
        a JSON acknowledgement containing payment ID, lifecycle status,
        correspondent settlement context, and correlation ID. X-Mock-Scenario is
        optional local/test-only behavior and defaults to fi_payment_accepted.
        Supported FI scenarios are fi_payment_accepted,
        fi_payment_rejected_unsupported_correspondent, and
        fi_payment_pending_correspondent_review. This FI behavior is
        simulator-only with no real SWIFT, CBPR+, correspondent banking,
        ledger, AML, sanctions, fraud, or settlement connectivity.
      security:
        - bearerAuth: []
      x-required-scopes:
        - fi-payments:create
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/FiMockScenario'
      requestBody:
        required: true
        content:
          application/pacs.009+xml:
            schema:
              type: string
              format: xml
              description: Supported ISO 20022 pacs.009.001.08 XML.
            examples:
              accepted:
                summary: USD NOSTRO route accepted
                value: |-
                  <?xml version="1.0" encoding="UTF-8"?>
                  <Document xmlns="urn:iso:std:iso:20022:tech:xsd:pacs.009.001.08">
                    <FICdtTrf>
                      <GrpHdr>
                        <MsgId>FI-MSG-20260528-ACCEPTED-NOSTRO</MsgId>
                        <NbOfTxs>1</NbOfTxs>
                        <InstgAgt><FinInstnId><BICFI>CIBBHKHH</BICFI></FinInstnId></InstgAgt>
                        <InstdAgt><FinInstnId><BICFI>CORRUS33</BICFI></FinInstnId></InstdAgt>
                      </GrpHdr>
                      <CdtTrfTxInf>
                        <PmtId><InstrId>FICLIENT01-PACS009-ACCEPTED-NOSTRO</InstrId><EndToEndId>FI-E2E-20260528-0001</EndToEndId></PmtId>
                        <IntrBkSttlmAmt Ccy="USD">100000.00</IntrBkSttlmAmt>
                        <IntrBkSttlmDt>2026-05-28</IntrBkSttlmDt>
                        <RmtInf><Ustrd>FICLIENT01 NOSTRO SYNTHETIC FIXTURE</Ustrd></RmtInf>
                      </CdtTrfTxInf>
                    </FICdtTrf>
                  </Document>
      responses:
        '202':
          description: FI payment accepted by the simulator for asynchronous status inspection.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiPaymentAcknowledgementResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/fi-payments/{paymentId}:
    get:
      operationId: GetFiPaymentStatus
      summary: Get FI payment status as JSON
      description: >
        Returns JSON FI payment lifecycle status for the authenticated FI
        client that owns the payment. Requires fi-payments:read. FI status
        query does not require Idempotency-Key. The response includes FI
        parties, USD settlement currency, simulator-derived correspondent
        settlement context, latest recall/investigation summary when present,
        reason details, links, and correlation ID.
      security:
        - bearerAuth: []
      x-required-scopes:
        - fi-payments:read
      parameters:
        - name: paymentId
          in: path
          required: true
          description: FI payment ID returned by CreateFiPayment.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Current FI payment status response.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FiPaymentStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/fi-payments/{paymentId}/recall-requests:
    post:
      operationId: CreateFiRecallInvestigation
      summary: Submit an FI camt.056 recall or investigation request
      description: >
        Accepts one supported camt.056.001.08 XML recall/cancellation request
        for an existing FI payment owned by the authenticated FI client.
        Requires fi-payments:investigate and Idempotency-Key. Returns 202
        Accepted with a deterministic camt.029.001.09 XML resolution. Supported
        local/test-only X-Mock-Scenario values are recall_accepted,
        recall_rejected, and investigation_pending; the default is
        recall_accepted. Recall/investigation records are linked to the
        original payment's simulator-derived NOSTRO, VOSTRO, or LORO
        correspondent context. Account roles are routing and investigation
        context only and not production ledger accounting.
      security:
        - bearerAuth: []
      x-required-scopes:
        - fi-payments:investigate
      parameters:
        - name: paymentId
          in: path
          required: true
          description: FI payment ID being recalled or investigated.
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/FiRecallMockScenario'
      requestBody:
        required: true
        content:
          application/camt.056+xml:
            schema:
              type: string
              format: xml
              description: Supported ISO 20022 camt.056.001.08 XML.
            examples:
              recallAccepted:
                summary: Recall request for original FI payment
                value: |-
                  <?xml version="1.0" encoding="UTF-8"?>
                  <Document xmlns="urn:iso:std:iso:20022:tech:xsd:camt.056.001.08">
                    <FIToFIPmtCxlReq>
                      <Assgnmt><Id>FICLIENT01-CAMT056-RECALL-ACCEPTED</Id><Assgnr><Agt><FinInstnId><BICFI>CIBBHKHH</BICFI></FinInstnId></Agt></Assgnr></Assgnmt>
                      <CtrlData><NbOfTxs>1</NbOfTxs></CtrlData>
                      <Undrlyg><TxInf><CxlId>FICLIENT01-CANCEL-ACCEPTED</CxlId><Case><Id>FICLIENT01-CASE-ACCEPTED</Id></Case><OrgnlEndToEndId>FI-E2E-20260528-0001</OrgnlEndToEndId><CxlRsnInf><Rsn><Cd>DUPL</Cd></Rsn><AddtlInf>FICLIENT01 RECALL ACCEPTED</AddtlInf></CxlRsnInf></TxInf></Undrlyg>
                    </FIToFIPmtCxlReq>
                  </Document>
      responses:
        '202':
          description: Supported camt.029.001.09 recall or investigation resolution.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/camt.029+xml:
              schema:
                type: string
                format: xml
              examples:
                accepted:
                  summary: Recall accepted
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:camt.029.001.09">
                      <RsltnOfInvstgtn><CxlDtls><TxInfAndSts><CxlStsId>FI-INV-20260528-0001</CxlStsId><OrgnlInstrId>FI-INSTR-20260528-0001</OrgnlInstrId><OrgnlEndToEndId>FI-E2E-20260528-0001</OrgnlEndToEndId><TxCxlSts>ACCP</TxCxlSts></TxInfAndSts></CxlDtls></RsltnOfInvstgtn>
                    </Document>
                rejected:
                  summary: Recall rejected
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:camt.029.001.09">
                      <RsltnOfInvstgtn><CxlDtls><TxInfAndSts><CxlStsId>FI-INV-20260528-0002</CxlStsId><OrgnlEndToEndId>FI-E2E-20260528-0001</OrgnlEndToEndId><TxCxlSts>RJCR</TxCxlSts></TxInfAndSts></CxlDtls></RsltnOfInvstgtn>
                    </Document>
                pending:
                  summary: Investigation pending
                  value: |-
                    <?xml version="1.0" encoding="UTF-8"?>
                    <Document xmlns="urn:iso:std:iso:20022:tech:xsd:camt.029.001.09">
                      <RsltnOfInvstgtn><CxlDtls><TxInfAndSts><CxlStsId>FI-INV-20260528-0003</CxlStsId><OrgnlEndToEndId>FI-E2E-20260528-0001</OrgnlEndToEndId><TxCxlSts>PDCR</TxCxlSts></TxInfAndSts></CxlDtls></RsltnOfInvstgtn>
                    </Document>
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/IdempotencyConflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/payment-scenario-advisor/scenarios:
    get:
      operationId: ListPaymentScenarioAdvisorScenarios
      summary: List Payment Scenario Advisor scenarios
      description: >
        Returns the curated Payment Scenario Advisor catalog for simulator-only
        guidance. The advisor is read-only and does not create payment,
        recommendation, simulation, or report records. Idempotency-Key is not
        required.
      security: []
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Supported advisor scenarios.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvisorScenarioCatalogResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/payment-scenario-advisor/scenarios/{scenarioId}:
    get:
      operationId: GetPaymentScenarioAdvisorScenario
      summary: Get Payment Scenario Advisor scenario detail
      description: >
        Returns scenario detail, recommendation intent, recommendation summary,
        simulation plan, and feedback report framing for a curated advisor
        scenario. Supported scenario IDs are urgent-supplier-payment,
        vendor-batch-payment, high-value-treasury-transfer, and
        fi-correspondent-settlement. The simulation plan is simulator-only
        guidance and requires explicit user confirmation before any separate
        simulator journey is run.
      security: []
      parameters:
        - name: scenarioId
          in: path
          required: true
          schema:
            type: string
          description: Stable advisor scenario ID.
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Advisor scenario detail.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdvisorScenarioDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/payment-rail-recommendations:
    post:
      operationId: CreatePaymentRailRecommendation
      summary: Recommend a payment rail and arrangement for a payment intent
      description: >
        Accepts one JSON rail-neutral payment intent and returns deterministic
        simulator guidance for RTP, ACH, RTGS, or FI correspondent arrangement.
        Idempotency-Key is not required because this endpoint is stateless and
        does not create payment, batch, FI, recall, investigation, or
        idempotency records. The 100000 USD value is a deterministic simulator
        threshold and not a real scheme limit, bank policy, or production
        decision threshold. Valid cross-border or non-USD intents return
        recommendationStatus UNSUPPORTED. This endpoint performs no real AI,
        LLM, pricing, liquidity, sanctions, fraud, FX, compliance, or real rail
        availability decision.
      security:
        - bearerAuth: []
      x-required-scopes:
        - payment-rail-recommendations:create
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRailRecommendationRequest'
            examples:
              rtpImmediate:
                summary: Immediate low-value domestic USD intent
                value:
                  clientSegment: CORPORATE
                  paymentCount: 1
                  amountSummary:
                    currency: USD
                    totalAmount: '250.00'
                    maxSingleAmount: '250.00'
                  debtorCountry: US
                  creditorCountry: US
                  urgency: IMMEDIATE
                  requiresFinality: false
              unsupportedCrossBorder:
                summary: Valid but unsupported cross-border intent
                value:
                  clientSegment: CORPORATE
                  paymentCount: 1
                  amountSummary:
                    currency: USD
                    totalAmount: '1000.00'
                  debtorCountry: US
                  creditorCountry: GB
                  urgency: SAME_DAY
      responses:
        '200':
          description: Recommendation result for a supported or valid-but-unsupported intent.
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/CorrelationId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentRailRecommendationResponse'
              examples:
                rtp:
                  summary: RTP recommendation
                  value:
                    recommendationId: 11111111-1111-1111-1111-111111111111
                    recommendationStatus: RECOMMENDED
                    recommendedOption:
                      rail: RTP
                      arrangement: DOMESTIC_REAL_TIME_CLEARING
                      clientSegment: CORPORATE
                      reasonCode: IMMEDIATE_LOW_VALUE
                    confidenceLevel: HIGH
                    decisionSummary: RTP is recommended for immediate low-value domestic payment.
                    matchedFactors:
                      - DOMESTIC_USD
                      - IMMEDIATE_URGENCY
                      - LOW_VALUE
                    warnings: []
                    alternatives: []
                    tradeoffs: []
                    nextApiGuidance:
                      method: POST
                      endpoint: /v1/domestic-payments
                      requiredScopes:
                        - payments:create
                      requiredHeaders:
                        - Authorization
                        - X-Correlation-ID
                      payloadFormat: application/pain.001+xml
                    correlationId: postman-local-correlation-001
                unsupported:
                  summary: Unsupported cross-border recommendation result
                  value:
                    recommendationId: 22222222-2222-2222-2222-222222222222
                    recommendationStatus: UNSUPPORTED
                    confidenceLevel: LOW
                    decisionSummary: Cross-border payment intents are outside the simulator recommendation scope.
                    matchedFactors: []
                    warnings:
                      - code: CROSS_BORDER_NOT_SUPPORTED
                        message: Only domestic US intents are supported.
                    alternatives: []
                    tradeoffs: []
                    correlationId: postman-local-correlation-001
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Client-supplied key scoped to the authenticated client for idempotent payment creation.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      description: End-to-end tracing identifier. Generated by the API when absent.
      schema:
        type: string
        minLength: 1
        maxLength: 128
    MockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Local/test-only HK clearing and settlement simulator scenario selector.
        Not part of production payment semantics.
      schema:
        type: string
        enum:
          - success
          - rejection
          - suspicious_proxy_or_account
          - pending
          - timeout
          - internal_failure
    AchMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only ACH Direct Credit simulator scenario selector.
        Not part of production payment semantics. Omit for the default accepted
        for clearing scenario.
      schema:
        type: string
        enum:
          - ach_direct_credit_accepted
          - ach_direct_credit_settled
          - ach_direct_credit_settlement_pending
          - ach_direct_credit_partially_returned
          - ach_direct_credit_rejected
    RtgsMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only RTGS simulator scenario selector. Not part of
        production payment semantics. Omit for the default settled scenario.
      schema:
        type: string
        enum:
          - rtgs_settled
          - rtgs_queued_for_liquidity
          - rtgs_rejected
    CollectionMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only collections simulator scenario selector. Not
        part of production payment semantics. Omit for the default profile
        outcome.
      schema:
        type: string
        enum:
          - us_ach_debit_collected
          - us_ach_debit_settlement_pending
          - us_ach_debit_partially_returned
          - us_ach_debit_rejected_authorization
          - us_ach_debit_rejected_insufficient_funds
          - hk_fps_collection_completed
          - hk_fps_collection_pending_authorization
          - hk_fps_collection_rejected_invalid_authorization
          - hk_fps_collection_rejected_insufficient_funds
          - collection_timeout
          - collection_internal_failure
    MandateMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only mandate simulator scenario selector. Not part
        of production payment semantics. Omit for the default active outcome.
      schema:
        type: string
        enum:
          - mandate_active
          - mandate_pending_authorization
          - mandate_rejected_by_payer
          - mandate_expired
          - mandate_timeout
          - mandate_internal_failure
    FiMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only FI payment simulator scenario selector. Not
        part of production payment semantics. Omit for the default accepted
        scenario.
      schema:
        type: string
        enum:
          - fi_payment_accepted
          - fi_payment_rejected_unsupported_correspondent
          - fi_payment_pending_correspondent_review
    FiRecallMockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      description: >
        Optional local/test-only FI recall/investigation simulator scenario
        selector. Not part of production payment semantics. Omit for the
        default accepted scenario.
      schema:
        type: string
        enum:
          - recall_accepted
          - recall_rejected
          - investigation_pending
  headers:
    CorrelationId:
      description: Correlation ID used for request tracing.
      schema:
        type: string
  responses:
    BadRequest:
      description: Malformed XML, unsupported media type, unsupported ISO version, validation failure, or missing required header.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing, expired, invalid, or unverifiable JWT.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated client lacks the required scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Payment not found or not visible to the authenticated client.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    IdempotencyConflict:
      description: Idempotency key was reused with different normalized payment semantics or scenario context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: HKD-only profile or payment semantic validation failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Unexpected API failure.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AdvisorScenarioCatalogResponse:
      type: object
      required:
        - scenarios
        - correlationId
      properties:
        scenarios:
          type: array
          items:
            $ref: '#/components/schemas/AdvisorScenarioSummary'
        correlationId:
          type: string
    AdvisorScenarioSummary:
      type: object
      required:
        - scenarioId
        - businessLabel
        - businessDescription
        - recommendedRail
        - recommendedArrangement
        - simulatorOnly
        - requiresUserConfirmation
      properties:
        scenarioId:
          type: string
          enum:
            - urgent-supplier-payment
            - vendor-batch-payment
            - high-value-treasury-transfer
            - fi-correspondent-settlement
        businessLabel:
          type: string
        businessDescription:
          type: string
        recommendedRail:
          type: string
          enum: [RTP, ACH, RTGS, FI_CORRESPONDENT]
        recommendedArrangement:
          type: string
          enum:
            - DOMESTIC_REAL_TIME_CLEARING
            - BATCH_CLEARING_NET_SETTLEMENT
            - DOMESTIC_INTERBANK_GROSS_SETTLEMENT
            - CORRESPONDENT_ACCOUNT_PATH
        simulatorOnly:
          type: boolean
        requiresUserConfirmation:
          type: boolean
    AdvisorScenarioDetailResponse:
      type: object
      required:
        - scenarioId
        - businessLabel
        - businessDescription
        - simulatorOnly
        - requiresUserConfirmation
        - recommendationIntent
        - recommendation
        - simulationPlan
        - feedbackReport
        - correlationId
      properties:
        scenarioId:
          type: string
        businessLabel:
          type: string
        businessDescription:
          type: string
        simulatorOnly:
          type: boolean
        requiresUserConfirmation:
          type: boolean
        recommendationIntent:
          $ref: '#/components/schemas/AdvisorRecommendationIntent'
        recommendation:
          $ref: '#/components/schemas/AdvisorRecommendationSummary'
        simulationPlan:
          $ref: '#/components/schemas/AdvisorSimulationPlan'
        feedbackReport:
          $ref: '#/components/schemas/AdvisorFeedbackReport'
        correlationId:
          type: string
    AdvisorRecommendationIntent:
      type: object
      required:
        - clientSegment
        - paymentPurpose
        - paymentCount
        - amountSummary
        - debtorCountry
        - creditorCountry
        - urgency
        - requiresFinality
        - batchPreferred
        - costSensitivity
        - fiToFi
      properties:
        clientSegment:
          type: string
          enum: [CORPORATE, FI]
        paymentPurpose:
          type: string
        paymentCount:
          type: integer
          minimum: 1
        amountSummary:
          $ref: '#/components/schemas/AdvisorAmountSummary'
        debtorCountry:
          type: string
        creditorCountry:
          type: string
        urgency:
          type: string
          enum: [IMMEDIATE, SAME_DAY, STANDARD]
        creditorType:
          type: string
        requiresFinality:
          type: boolean
        batchPreferred:
          type: boolean
        costSensitivity:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        fiToFi:
          type: boolean
        arrangementPreference:
          type: string
    AdvisorAmountSummary:
      type: object
      required:
        - currency
        - totalAmount
      properties:
        currency:
          type: string
          enum: [USD]
        totalAmount:
          type: string
        maxSingleAmount:
          type: string
    AdvisorRecommendationSummary:
      type: object
      required:
        - rail
        - arrangement
        - clientSegment
        - confidenceLevel
        - reasonCode
        - summary
        - matchedFactors
        - tradeoffs
      properties:
        rail:
          type: string
          enum: [RTP, ACH, RTGS, FI_CORRESPONDENT]
        arrangement:
          type: string
          enum:
            - DOMESTIC_REAL_TIME_CLEARING
            - BATCH_CLEARING_NET_SETTLEMENT
            - DOMESTIC_INTERBANK_GROSS_SETTLEMENT
            - CORRESPONDENT_ACCOUNT_PATH
        clientSegment:
          type: string
          enum: [CORPORATE, FI]
        confidenceLevel:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        reasonCode:
          type: string
        summary:
          type: string
        matchedFactors:
          type: array
          items:
            type: string
        tradeoffs:
          type: array
          items:
            type: string
    AdvisorSimulationPlan:
      type: object
      required:
        - method
        - endpoint
        - requiredScopes
        - requiredHeaders
        - idempotencyRequired
        - payloadFormat
        - mockScenario
        - statusEndpointTemplate
        - expectedStatus
        - simulatorOnly
        - requiresUserConfirmation
      properties:
        method:
          type: string
          enum: [POST]
        endpoint:
          type: string
        requiredScopes:
          type: array
          items:
            type: string
        requiredHeaders:
          type: array
          items:
            type: string
        idempotencyRequired:
          type: boolean
        payloadFormat:
          type: string
        mockScenario:
          type: string
          description: Local simulator selector scoped to simulator guidance only.
        statusEndpointTemplate:
          type: string
        expectedStatus:
          type: string
        simulatorOnly:
          type: boolean
        requiresUserConfirmation:
          type: boolean
    AdvisorFeedbackReport:
      type: object
      required:
        - validationStatus
        - expectedOutcome
        - businessConclusion
        - nextStep
      properties:
        validationStatus:
          type: string
        expectedOutcome:
          type: string
        businessConclusion:
          type: string
        nextStep:
          type: string
    CreatePaymentRailRecommendationRequest:
      type: object
      required:
        - clientSegment
        - paymentCount
        - amountSummary
        - debtorCountry
        - creditorCountry
        - urgency
      properties:
        clientSegment:
          type: string
          enum: [CORPORATE, FI]
        paymentPurpose:
          type: string
        paymentCount:
          type: integer
          minimum: 1
          description: Intent-level count of payments represented by the recommendation request.
        amountSummary:
          $ref: '#/components/schemas/RecommendationAmountSummaryRequest'
        debtorCountry:
          type: string
          example: US
        creditorCountry:
          type: string
          example: US
        urgency:
          type: string
          enum: [IMMEDIATE, SAME_DAY, NEXT_DAY, STANDARD]
        creditorType:
          type: string
        requiresFinality:
          type: boolean
        batchPreferred:
          type: boolean
        costSensitivity:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        fiToFi:
          type: boolean
        arrangementPreference:
          type: string
          enum:
            - DOMESTIC_REAL_TIME_CLEARING
            - BATCH_CLEARING_NET_SETTLEMENT
            - DOMESTIC_INTERBANK_GROSS_SETTLEMENT
            - CORRESPONDENT_ACCOUNT_PATH
        debtorAccountProfile:
          $ref: '#/components/schemas/RecommendationDebtorAccountProfileRequest'
      description: >
        Rail-neutral intent summary. It does not require account identifiers
        and does not accept a complete create-payment payload.
    RecommendationAmountSummaryRequest:
      type: object
      required:
        - currency
        - totalAmount
      properties:
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: USD is supported for recommendations; other valid currencies return UNSUPPORTED.
        totalAmount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
        maxSingleAmount:
          type: string
          pattern: '^[0-9]+(\.[0-9]{1,2})?$'
          description: Optional highest individual payment amount for multiple-payment intents.
    RecommendationDebtorAccountProfileRequest:
      type: object
      properties:
        count:
          type: integer
          minimum: 1
          default: 1
          description: Optional debtor account count signal; defaults to one when omitted.
    PaymentRailRecommendationResponse:
      type: object
      required:
        - recommendationId
        - recommendationStatus
        - confidenceLevel
        - decisionSummary
        - matchedFactors
        - warnings
        - alternatives
        - tradeoffs
        - correlationId
      properties:
        recommendationId:
          type: string
          format: uuid
          description: Response-local diagnostic reference; no query endpoint is exposed in the MVP.
        recommendationStatus:
          type: string
          enum: [RECOMMENDED, UNSUPPORTED]
        recommendedOption:
          $ref: '#/components/schemas/RecommendationOption'
        confidenceLevel:
          type: string
          enum: [HIGH, MEDIUM, LOW]
          description: Qualitative simulator confidence level; no numeric score is returned.
        decisionSummary:
          type: string
        matchedFactors:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationWarning'
        alternatives:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationOption'
        tradeoffs:
          type: array
          items:
            $ref: '#/components/schemas/RecommendationTradeoff'
        nextApiGuidance:
          $ref: '#/components/schemas/RecommendationNextApiGuidance'
        correlationId:
          type: string
    RecommendationOption:
      type: object
      required:
        - rail
        - arrangement
        - clientSegment
        - reasonCode
      properties:
        rail:
          type: string
          enum: [RTP, ACH, RTGS, FI_CORRESPONDENT]
        arrangement:
          type: string
          enum:
            - DOMESTIC_REAL_TIME_CLEARING
            - BATCH_CLEARING_NET_SETTLEMENT
            - DOMESTIC_INTERBANK_GROSS_SETTLEMENT
            - CORRESPONDENT_ACCOUNT_PATH
        clientSegment:
          type: string
          enum: [CORPORATE, FI]
        reasonCode:
          type: string
    RecommendationWarning:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: MAX_SINGLE_AMOUNT_NOT_PROVIDED
        message:
          type: string
    RecommendationTradeoff:
      type: object
      required:
        - rail
        - arrangement
        - speed
        - cost
        - finality
        - intentFit
        - intentFitReason
        - summary
      properties:
        rail:
          type: string
          enum: [RTP, ACH, RTGS, FI_CORRESPONDENT]
        arrangement:
          type: string
          enum:
            - DOMESTIC_REAL_TIME_CLEARING
            - BATCH_CLEARING_NET_SETTLEMENT
            - DOMESTIC_INTERBANK_GROSS_SETTLEMENT
            - CORRESPONDENT_ACCOUNT_PATH
        speed:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        cost:
          type: string
          enum: [HIGH, MEDIUM, LOW]
        finality:
          type: string
          enum: [REAL_TIME, DEFERRED, IMMEDIATE_FINAL, CORRESPONDENT_DEPENDENT]
        intentFit:
          type: string
          enum: [HIGH, MEDIUM, LOW]
          description: Simulator rule explanation only, not production suitability, compliance, pricing, or SLA evidence.
        intentFitReason:
          type: string
        summary:
          type: string
    RecommendationNextApiGuidance:
      type: object
      required:
        - method
        - endpoint
        - requiredScopes
        - requiredHeaders
        - payloadFormat
      properties:
        method:
          type: string
          enum: [POST]
        endpoint:
          type: string
        requiredScopes:
          type: array
          items:
            type: string
        requiredHeaders:
          type: array
          items:
            type: string
        payloadFormat:
          type: string
      description: Identifies candidate API endpoint, scopes, headers, and payload format, but does not generate a complete payment creation payload.
    ErrorResponse:
