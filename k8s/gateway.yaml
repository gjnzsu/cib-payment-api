apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: domestic-rtp-payment-api
  labels:
    app: domestic-rtp-payment-api
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: domestic-rtp-payment-api
  labels:
    app: domestic-rtp-payment-api
spec:
  parentRefs:
    - name: domestic-rtp-payment-api
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/domestic-payments
        - path:
            type: PathPrefix
            value: /swagger-ui
        - path:
            type: PathPrefix
            value: /swagger-ui.html
        - path:
            type: PathPrefix
            value: /openapi
        - path:
            type: PathPrefix
            value: /v3/api-docs
        - path:
            type: PathPrefix
            value: /actuator/health
      backendRefs:
        - name: domestic-rtp-payment-api
          port: 80
